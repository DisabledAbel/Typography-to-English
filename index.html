<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTypography Front Maker</title>
  <style>
    :root {
      --bg: #1f140f;
      --panel: #2b1b14;
      --accent: #ff8c2a;
      --accent-soft: #ffb066;
      --text: #f8efe8;
      --muted: #d9bba4;
      --border: #5c3a24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(140deg, #180f0a 0%, #2d1a12 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(950px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 16px 44px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; color: var(--accent); }
    p { margin: 0 0 16px; color: var(--muted); }
    .grid { display: grid; gap: 14px; }
    textarea {
      width: 100%;
      min-height: 120px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #1a110d;
      color: var(--text);
      padding: 12px;
      font-size: 15px;
      resize: vertical;
    }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    pre {
      background: #1a110d;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin: 0;
      overflow-x: auto;
      white-space: pre-wrap;
      color: #ffd9b2;
    }
    .label { color: var(--muted); font-size: 13px; }
    .footnote { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Typography Translator</h1>
    <p>Two-way converter: Typography ⇄ English, fully client-side (Vercel-ready).</p>
    <div class="grid">
      <label class="label" for="input">Input</label>
      <textarea id="input" placeholder='Paste text like: “Rust™ — ﬁne… really”'></textarea>
      <div class="row">
        <label for="direction" class="label">Direction:
          <select id="direction">
            <option value="english-to-typography" selected>Typography output</option>
          </select>
        </label>
        <button id="convert" type="button">Convert</button>
        <span class="label">Client-side only (Vercel static deploy compatible)</span>
      </div>
      <label class="label" for="output">Translated</label>
      <pre id="output"></pre>
      <label class="label" for="json">JSON</label>
      <pre id="json"></pre>
    </div>
  </main>

  <script>
    const typographyToEnglishMap = [
      ["“", '"'], ["”", '"'], ["‘", "'"], ["’", "'"], ["—", " -- "], ["–", " - "],
      ["…", "..."], ["•", "*"], ["™", "(TM)"], ["®", "(R)"], ["©", "(C)"], ["½", "1/2"],
      ["¼", "1/4"], ["¾", "3/4"], ["ﬁ", "fi"], ["ﬂ", "fl"], ["\u00A0", " "]
    ];

    const englishToTypographyMap = [
      [" -- ", "—"], [" - ", "–"], ["...", "…"], ["(TM)", "™"], ["(R)", "®"], ["(C)", "©"],
      ["1/2", "½"], ["1/4", "¼"], ["3/4", "¾"], ["fi", "ﬁ"], ["fl", "ﬂ"], ["*", "•"]
    ];

    function normalizeSpacing(s) {
      return s.split(/\s+/).filter(Boolean).join(" ").trim();
    }

    function stylizeAsciiLetters(text) {
      let changed = false;
      let output = "";
      for (const ch of text) {
        const code = ch.codePointAt(0);
        if (code >= 65 && code <= 90) {
          output += String.fromCodePoint(0x1D400 + (code - 65));
          changed = true;
        } else if (code >= 97 && code <= 122) {
          output += String.fromCodePoint(0x1D41A + (code - 97));
          changed = true;
        } else {
          output += ch;
        }
      }
      return changed ? output : null;
    }

    function applyContextualQuotes(text, replacements) {
      let result = "";
      let doubleQuoteOpen = true;
      let singleQuoteOpen = true;

      for (const ch of text) {
        if (ch === '"') {
          result += doubleQuoteOpen ? "“" : "”";
          doubleQuoteOpen = !doubleQuoteOpen;
        } else if (ch === "'") {
          result += singleQuoteOpen ? "‘" : "’";
          singleQuoteOpen = !singleQuoteOpen;
        } else {
          result += ch;
        }
      }

      const doubleCount = (text.match(/"/g) || []).length;
      const singleCount = (text.match(/'/g) || []).length;
      if (doubleCount > 0) replacements.push({ from: '"', to: '“/”', count: doubleCount });
      if (singleCount > 0) replacements.push({ from: "'", to: "‘/’", count: singleCount });

      return result;
    }

    function translate(inputText, directionMode) {
      let text = inputText;
      const replacements = [];

      if (directionMode === "english-to-typography") {
        text = applyContextualQuotes(text, replacements);
        for (const [from, to] of englishToTypographyMap) {
          const count = text.split(from).length - 1;
          if (count > 0) {
            text = text.split(from).join(to);
            replacements.push({ from, to, count });
          }
        }
        if (replacements.length === 0) {
          const stylized = stylizeAsciiLetters(text);
          if (stylized !== null) {
            text = stylized;
            replacements.push({ from: "A-Z/a-z", to: "Mathematical bold letters", count: text.length });
          }
        }
      } else {
        for (const [from, to] of typographyToEnglishMap) {
          const count = text.split(from).length - 1;
          if (count > 0) {
            text = text.split(from).join(to);
            replacements.push({ from, to, count });
          }
        }
      }

      return {
        original: inputText,
        translated: normalizeSpacing(text),
        replacements
      };
    }

    function setupTranslator() {
      const input = document.getElementById('input');
      const output = document.getElementById('output');
      const json = document.getElementById('json');
      const direction = document.getElementById('direction');
      const convert = document.getElementById('convert');
      function render() {
        const result = translate(input.value || '', direction.value);
        output.textContent = result.translated;
        json.textContent = JSON.stringify(result, null, 2);
      }

      input.addEventListener('input', render);
      direction.addEventListener('change', render);
      convert.addEventListener('click', render);
      render();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setupTranslator);
    } else {
      setupTranslator();
    }
  </script>
</body>
</html>
