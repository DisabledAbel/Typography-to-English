name: Auto-fix repository issues

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Apply automatic Rust fixes
        run: |
          cargo fix --allow-dirty --allow-staged || true
          cargo fmt

      - name: Verify app checks
        run: |
          cargo test
          ./scripts/check_web_ui.sh

      - name: Commit and push auto-fixes
        run: |
          if git diff --quiet; then
            echo "No fixes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: automated fixes"
          git push
